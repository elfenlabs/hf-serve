image:
  repository: hf-serve
  tag: latest
  pullPolicy: IfNotPresent

# -- Server configuration
server:
  host: "0.0.0.0"
  port: 8080
  replicas: 1

# -- Resource limits
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi

# -- Persistent storage for synced models
persistence:
  enabled: true
  size: 500Gi
  # -- Leave empty to use cluster default storage class
  storageClass: ""
  accessModes:
    - ReadWriteOnce

# -- Collection configuration (rendered into ConfigMap)
# This is the same YAML format as the hf-serve config file.
collection:
  storage:
    root: /data/hf-serve

  sync:
    interval_seconds: 3600
    default_revision: main
    # Limit number of parallel file downloads (set to 1 for sequential download)
    # max_workers: 1
    # Limit raw bandwidth speed per stream (e.g. "500KB", "2MB", "5M", or integer bytes)
    # bandwidth_limit: "5MB"

  entries: {}
  #  qwen3-32b-awq:
  #    repository: Qwen/Qwen3-32B-AWQ
  #    allow_patterns:
  #      - "*.json"
  #      - "*.safetensors"
  #      - "tokenizer.*"
  #    ignore_patterns:
  #      - "*.bin"
  #      - "*.gguf"

# -- Hugging Face authentication
# Reference an existing Secret containing a `HF_TOKEN` key.
# Set to "" to disable.
hfTokenSecret: ""

# -- Periodic sync CronJob
cronjob:
  enabled: true
  schedule: "0 * * * *"
  # -- Number of successful/failed job history to keep
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi

# -- Service configuration
service:
  type: ClusterIP
  port: 8080

# -- ServiceMonitor configuration for Prometheus Operator
serviceMonitor:
  enabled: false
  interval: 1m
  labels: {}
  # scrapeTimeout: 10s

# -- Extra annotations to add to the pod template.
# Useful for CNI bandwidth limits, e.g.:
#   kubernetes.io/ingress-bandwidth: "50M"
podAnnotations: {}

# -- Pod-level settings
nodeSelector: {}
tolerations: []
affinity: {}

# -- SSH/Rsync client pull gateway settings
gateway:
  enabled: false
  # -- Port exposed by the gateway Service
  port: 22
  # -- Service type: LoadBalancer, NodePort, or ClusterIP
  serviceType: LoadBalancer
  # -- SSH authorized public keys (string or list of strings)
  authorizedKeys: ""
  # -- PUID and PGID for the ssh service container
  puid: 1000
  pgid: 1000
  # -- Timezone
  timezone: UTC
  # -- Username for the SSH login
  username: dgx

