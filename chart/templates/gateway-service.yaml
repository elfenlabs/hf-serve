{{- if .Values.gateway.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hf-serve.fullname" . }}-gateway
  labels:
    {{- include "hf-serve.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  type: {{ .Values.gateway.serviceType }}
  ports:
    - port: {{ .Values.gateway.port }}
      targetPort: ssh
      protocol: TCP
      name: ssh
  selector:
    {{- include "hf-serve.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
{{- end }}
